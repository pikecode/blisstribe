services:
  postgres:
    image: postgres:15-alpine
    container_name: blisstribe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blisstribe
      POSTGRES_PASSWORD: blisstribe
      POSTGRES_DB: blisstribe
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blisstribe']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blisstribe-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
